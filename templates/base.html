<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Dataward{% endblock %}</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <script src="/static/htmx.min.js"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --bg-card: #16213e;
            --bg-table: #0f3460;
            --text: #e0e0e0;
            --text-muted: #8892a0;
            --accent: #53a8b6;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
            --info: #2196f3;
            --secondary: #6c757d;
            --border: #2a3a5c;
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f5f5f5;
                --bg-card: #ffffff;
                --bg-table: #fafafa;
                --text: #212121;
                --text-muted: #757575;
                --accent: #00838f;
                --border: #e0e0e0;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        nav {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        nav .brand { font-weight: bold; color: var(--accent); font-size: 1.1rem; }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
        }
        nav a:hover, nav a.active { color: var(--text); background: var(--bg-table); }
        nav .spacer { flex: 1; }
        .container { max-width: 1200px; margin: 1.5rem auto; padding: 0 1.5rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { font-weight: 600; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge.success { background: var(--success); color: #fff; }
        .badge.danger { background: var(--danger); color: #fff; }
        .badge.warning { background: var(--warning); color: #000; }
        .badge.info { background: var(--info); color: #fff; }
        .badge.secondary { background: var(--secondary); color: #fff; }
        button, .btn {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg-table);
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            text-decoration: none;
        }
        button:hover, .btn:hover { background: var(--accent); color: #fff; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button:disabled:hover { background: var(--bg-table); color: var(--text); }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #fff; }
        .empty-state { text-align: center; padding: 2rem; color: var(--text-muted); }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        .htmx-request.htmx-indicator { display: inline; }
        .spinner { display: inline-block; width: 1rem; height: 1rem; border: 2px solid var(--text-muted); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        input[type="text"], input[type="password"] {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            width: 100%;
            max-width: 400px;
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.25rem; font-weight: 600; }
        .error { color: var(--danger); margin-bottom: 1rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
        .stat-card { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 0.85rem; color: var(--text-muted); }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body hx-headers='{"x-csrf-token": "{{ csrf_token }}"}'>
    {% block nav %}
    <nav>
        <span class="brand">Dataward</span>
        <a href="/">Status</a>
        <a href="/history">History</a>
        <a href="/captcha">CAPTCHAs</a>
        <a href="/health">Health</a>
        <span class="spacer"></span>
        <a href="/logout">Logout</a>
    </nav>
    {% endblock %}
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
