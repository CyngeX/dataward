<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dataward — Login</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --bg-card: #16213e;
            --text: #e0e0e0;
            --text-muted: #8892a0;
            --accent: #53a8b6;
            --danger: #f44336;
            --border: #2a3a5c;
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f5f5f5;
                --bg-card: #ffffff;
                --text: #212121;
                --text-muted: #757575;
                --accent: #00838f;
                --border: #e0e0e0;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.25rem; font-weight: 600; }
        input[type="password"] {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            width: 100%;
        }
        button {
            padding: 0.5rem 1.5rem;
            border: none;
            border-radius: 4px;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
        }
        button:hover { opacity: 0.9; }
        .error { color: var(--danger); margin-bottom: 1rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Dataward</h1>
        <p class="subtitle">Enter your dashboard token to continue</p>
        {% if let Some(err) = error %}
        <p class="error">{{ err }}</p>
        {% endif %}
        <form method="POST" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-group">
                <label for="token">Token</label>
                <input type="password" id="token" name="token" placeholder="Paste your dashboard token" required autofocus>
            </div>
            <button type="submit">Log in</button>
        </form>
    </div>
</body>
</html>
