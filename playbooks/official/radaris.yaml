broker:
  id: radaris
  name: Radaris
  url: https://radaris.com
  category: people_search
  recheck_days: 90
  opt_out_channel: web_form
  allowed_domains:
    - radaris.com
    - www.radaris.com

required_fields:
  - first_name
  - last_name
  - state

steps:
  # Navigate to the Radaris opt-out control page
  - navigate: "https://radaris.com/control/privacy"

  # Wait for the page to load
  - wait: { seconds: 2 }

  # Fill in personal information to find the record
  - fill: { selector: "input[name='fn']", field: "first_name" }
  - fill: { selector: "input[name='ln']", field: "last_name" }
  - fill: { selector: "input[name='state']", field: "state" }

  # Submit the search form
  - click: { selector: "button.btn-search" }

  # Wait for results to load
  - wait: { seconds: 3 }

  # Select the first matching profile for removal
  - click: { selector: ".profile-card .opt-out-btn" }

  # Wait for the opt-out confirmation
  - wait: { seconds: 2 }

  # Confirm the removal request
  - click: { selector: "button.confirm-removal" }

  # Wait for processing
  - wait: { seconds: 2 }

  # Capture proof of the removal request submission
  - screenshot: { name: "removal_confirmation" }

on_error: retry
max_retries: 3
