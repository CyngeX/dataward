name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-tag:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tagged commit is on main branch
        run: |
          TAG_COMMIT=$(git rev-list -n 1 "${{ github.ref }}")
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "::error::Tagged commit is not on the main branch. Release tags must point to commits on main."
            exit 1
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: verify-tag
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build worker
        working-directory: worker
        run: |
          npm ci
          npm run build

      - name: Verify worker build output
        run: |
          if [ ! -d "worker/dist" ] || [ -z "$(ls -A worker/dist)" ]; then
            echo "::error::Worker build produced no output in worker/dist/"
            exit 1
          fi

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --features embedded-worker

      - name: Verify binary exists
        run: |
          BINARY="target/${{ matrix.target }}/release/dataward"
          if [ ! -f "$BINARY" ]; then
            echo "::error::Release binary not found at $BINARY"
            exit 1
          fi
          echo "BINARY_PATH=$BINARY" >> "$GITHUB_ENV"
          echo "Binary size: $(du -h "$BINARY" | cut -f1)"

      - name: Package release artifact
        run: |
          ARCHIVE="dataward-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" dataward
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Generate SHA256 checksum
        run: |
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          cat "$ARCHIVE.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
